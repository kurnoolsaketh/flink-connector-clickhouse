name: Claude Sandbox Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    # Trigger on comments containing the phrase.
    # - issue_comment: general PR conversation comments (has github.event.issue.pull_request)
    # - pull_request_review_comment: inline code comments (always on a PR)
    if: |
      contains(github.event.comment.body, '@claude-sandbox-reviewer') &&
      (github.event_name == 'pull_request_review_comment' || github.event.issue.pull_request)
    runs-on: macos-latest
    timeout-minutes: 60

    env:
      GH_TOKEN: ${{ github.token }}
      # PR number lives in different places depending on the event type
      PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
      COMMENT_ID: ${{ github.event.comment.id }}
      COMMENTER: ${{ github.event.comment.user.login }}
      REPO: ${{ github.repository }}
      # Reactions API endpoint differs: issue comments vs PR review comments
      COMMENT_REACTIONS_URL: ${{ github.event_name == 'pull_request_review_comment' && format('repos/{0}/pulls/comments/{1}/reactions', github.repository, github.event.comment.id) || format('repos/{0}/issues/comments/{1}/reactions', github.repository, github.event.comment.id) }}
      # Comment body fetch endpoint differs too
      COMMENT_API_URL: ${{ github.event_name == 'pull_request_review_comment' && format('repos/{0}/pulls/comments/{1}', github.repository, github.event.comment.id) || format('repos/{0}/issues/comments/{1}', github.repository, github.event.comment.id) }}

    steps:
      # ── 1. Permission check ────────────────────────────────────────────────────
      - name: Check commenter permissions
        run: |
          PERMISSION=$(gh api "repos/${REPO}/collaborators/${COMMENTER}/permission" --jq '.permission')
          if [[ "$PERMISSION" != "admin" && "$PERMISSION" != "write" ]]; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" \
              --body "Sorry @${COMMENTER}, only repo collaborators with write access can trigger sandbox reviews."
            echo "::error::User ${COMMENTER} has '${PERMISSION}' permission, needs 'write' or 'admin'"
            exit 1
          fi
          echo "User ${COMMENTER} has '${PERMISSION}' permission — authorized"

      # ── 2. Acknowledge with reaction ────────────────────────────────────────────
      - name: Add eyes reaction
        run: |
          gh api "${COMMENT_REACTIONS_URL}" -f content='eyes' --silent

      # ── 3. Checkout repo and fetch PR branch ─────────────────────────────────────
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fetch PR branch and stay on default branch
        id: pr-branch
        run: |
          # Get the PR branch name
          PR_BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName')
          echo "name=${PR_BRANCH}" >> "$GITHUB_OUTPUT"

          # Fetch the PR branch so tachikoma can create a worktree for it.
          # We stay on the default branch (from actions/checkout) to avoid
          # conflicting with tachikoma's worktree creation.
          gh pr checkout "$PR_NUMBER"
          git checkout -

      # ── 4. Install Tart ─────────────────────────────────────────────────────────
      - name: Install Tart
        run: brew install cirruslabs/cli/tart

      # ── 5. Pull base image ──────────────────────────────────────────────────────
      - name: Pull and prepare base image
        run: |
          tart pull ghcr.io/cirruslabs/ubuntu:latest
          tart clone ghcr.io/cirruslabs/ubuntu:latest ubuntu

      # ── 6. Build tachikoma from branch (temporary, for debugging) ───────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Build tachikoma from source
        run: |
          git clone --branch improvement/add-non-interactive-mode --depth 1 \
            https://github.com/ClickHouse/tachikoma.git /tmp/tachikoma-build
          cd /tmp/tachikoma-build
          cargo build --release
          cp target/release/tachikoma /usr/local/bin/tachikoma
          chmod +x /usr/local/bin/tachikoma
          tachikoma --version

      # # ── 6. Download tachikoma binary ──────────────────────────────────────────
      # - name: Install tachikoma
      #   run: |
      #     gh release download --repo ClickHouse/tachikoma \
      #       --pattern 'tachikoma-macos-arm64' --dir /usr/local/bin
      #     chmod +x /usr/local/bin/tachikoma-macos-arm64
      #     mv /usr/local/bin/tachikoma-macos-arm64 /usr/local/bin/tachikoma
      #     tachikoma --version

      # ── 7. Configure tachikoma ──────────────────────────────────────────────────
      - name: Write tachikoma config
        run: |
          mkdir -p ~/.config/tachikoma
          cat > ~/.config/tachikoma/config.toml << 'EOF'
          credential_proxy = true
          sync_gh_auth = true
          EOF

      # ── 8. Set up gh auth on host ───────────────────────────────────────────────
      - name: Authenticate gh CLI
        run: |
          # Temporarily unset GH_TOKEN so gh auth login can store credentials
          # on disk at ~/.config/gh/hosts.yml (needed for sync_gh_auth).
          echo "$GH_TOKEN" | env -u GH_TOKEN gh auth login --with-token

      # ── 9. Write prompt file ────────────────────────────────────────────────────
      - name: Prepare review prompt
        run: |
          PR_TITLE=$(gh pr view "$PR_NUMBER" --json title --jq '.title')
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body')
          PR_DIFF=$(gh pr diff "$PR_NUMBER")
          COMMENT_BODY=$(gh api "${COMMENT_API_URL}" --jq '.body')

          cat > .claude-review-prompt.md << PROMPT_EOF
          # Code Review Request

          ## PR #${PR_NUMBER}: ${PR_TITLE}

          ${PR_BODY}

          ## Triggering Comment

          ${COMMENT_BODY}

          ## Diff

          \`\`\`diff
          ${PR_DIFF}
          \`\`\`

          ## Instructions

          - Use the code-reviewer agent to review this PR
          - Do NOT make any commits to the branch
          - Only propose suggestions via PR review comments (inline comments)
          - Use \`gh pr review ${PR_NUMBER}\` to submit your review with inline comments on specific lines
          - Focus on bugs, logic errors, security issues, and code quality
          - Be constructive and specific in your feedback
          PROMPT_EOF

      # ── 10. Ensure macOS DHCP is running for Tart vmnet ─────────────────────────
      - name: Restart DHCP service
        run: sudo launchctl kickstart -k system/com.apple.bootpd

      # ── 11. Spawn VM ────────────────────────────────────────────────────────────
      - name: Spawn tachikoma VM
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: tachikoma spawn "${{ steps.pr-branch.outputs.name }}" --no-interactive

      # ── 11. Execute Claude ──────────────────────────────────────────────────────
      - name: Run Claude review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          tachikoma exec -- claude --dangerously-skip-permissions \
            -p "Read the review instructions and PR context from ~/code/.claude-review-prompt.md and follow them precisely."

      # ── 12. Cleanup ─────────────────────────────────────────────────────────────
      - name: Destroy VM
        if: always()
        run: tachikoma destroy --force || true

      # ── 13. Success reaction ────────────────────────────────────────────────────
      - name: Add success reaction
        if: success()
        run: |
          gh api "${COMMENT_REACTIONS_URL}" -f content='rocket' --silent

      # ── 14. Failure comment ─────────────────────────────────────────────────────
      - name: Comment on failure
        if: failure()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh pr comment "$PR_NUMBER" --repo "$REPO" \
            --body "Sandbox review failed. See the [workflow run](${RUN_URL}) for details."
